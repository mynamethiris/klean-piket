[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Jangan bundle libsql — biarkan sebagai external module
  external_node_modules = ["@libsql/client", "@libsql/client/http", "@libsql/linux-x64-gnu", "@libsql/darwin-arm64"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/uploads/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev:frontend"
  port = 5173
  targetPort = 5173
  framework = "#custom"
